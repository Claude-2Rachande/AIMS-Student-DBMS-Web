<!DOCTYPE html>
<html>

<head>

    <title>Delete Student</title>

</head>

<body>

    <h1>Delete Student</h1>

    <p>

        Are you sure you want to delete:

        <strong>

            {{ student.registration_number }}

            -

            {{ student.first_name }}

            {{ student.last_name }}

        </strong>

        ?

    </p>

    <form method="post">

        {% csrf_token %}

        <button type="submit">

            Yes, Delete

        </button>

    </form>

    <br>

    <a href="/students/">

        Cancel

    </a>

</body>

</html>
