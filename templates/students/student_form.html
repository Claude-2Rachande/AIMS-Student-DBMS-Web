<!DOCTYPE html>
<html>

<head>

    <title>Student Form</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#002147;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{

            width:50%;

            margin:auto;

            margin-top:40px;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0px 4px 12px rgba(0,0,0,0.15);
        }

        .btn{

            padding:12px 20px;

            border:none;

            border-radius:5px;

            cursor:pointer;

            text-decoration:none;

            font-weight:bold;
        }

        .save-btn{

            background:#002147;

            color:white;
        }

        .back-btn{

            background:#fcb900;

            color:#002147;
        }

    </style>

</head>

<body>

    <div class="header">

        <h1>Student Form</h1>

    </div>

    <div class="container">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn save-btn">

                Save Student

            </button>

            <a
                href="/students/"
                class="btn back-btn">

                Back

            </a>

        </form>

    </div>

</body>

</html>
