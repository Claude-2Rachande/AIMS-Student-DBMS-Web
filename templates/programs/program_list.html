<!DOCTYPE html>
<html>

<head>

    <title>Program Management</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#002147;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:30px;
        }

        .top-actions{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
        }

        .btn{
            text-decoration:none;
            padding:10px 20px;
            border-radius:5px;
            font-weight:bold;
        }

        .dashboard-btn{
            background:#002147;
            color:white;
        }

        .add-btn{
            background:#fcb900;
            color:#002147;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 4px 12px rgba(0,0,0,0.15);
        }

        th{
            background:#002147;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f5f5f5;
        }

    </style>

</head>

<body>

    <div class="header">

        <h1>Program Management</h1>

    </div>

    <div class="container">

        <div class="top-actions">

            <a href="/" class="btn dashboard-btn">
                ← Dashboard
            </a>

            <a href="/programs/add/" class="btn add-btn">
                + Add Program
            </a>

        </div>

        <table>

            <tr>
                <th>Program Name</th>
                <th>Specialization</th>
                <th>Duration (Months)</th>
            </tr>

            {% for program in programs %}
    <tr>
        <td>{{ program.program_name }}</td>
        <td>{{ program.specialization }}</td>
        <td>{{ program.duration_months }}</td>
        <td>

    <a href="/programs/update/{{ program.id }}/">
        Edit
    </a>

    |

    <a href="/programs/delete/{{ program.id }}/">
        Delete
    </a>

</td>
    </tr>
{% empty %}
    <tr>
        <td colspan="4">
            No programs available.
        </td>
    </tr>
{% endfor %}

        </table>

    </div>

</body>

</html>
