<!DOCTYPE html>
<html>

<head>

    <title>Add Program</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#002147;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{

            width:50%;

            margin:auto;

            margin-top:40px;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0px 4px 12px rgba(0,0,0,0.15);
        }

        h2{

            text-align:center;

            color:#002147;
        }

        form p{

            margin-bottom:15px;
        }

        input,
        select{

            width:100%;

            padding:10px;

            margin-top:5px;

            border:1px solid #ccc;

            border-radius:5px;

            box-sizing:border-box;
        }

        .btn{

            text-decoration:none;

            padding:12px 20px;

            border:none;

            border-radius:5px;

            cursor:pointer;

            font-weight:bold;
        }

        .save-btn{

            background:#002147;

            color:white;
        }

        .back-btn{

            background:#fcb900;

            color:#002147;

            margin-left:10px;
        }

        .actions{

            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="header">

        <h1>Add Program</h1>

    </div>

    <div class="container">

        <h2>Program Information</h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="actions">

                <button type="submit" class="btn save-btn">
                    Save Program
                </button>

                <a href="/programs/" class="btn back-btn">
                    Back
                </a>

            </div>

        </form>

    </div>

</body>

</html>
