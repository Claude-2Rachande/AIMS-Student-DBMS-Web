<!DOCTYPE html>
<html>

<head>

    <title>Delete Enrollment</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#002147;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{

            width:50%;

            margin:auto;

            margin-top:50px;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0px 4px 12px rgba(0,0,0,0.15);

            text-align:center;
        }

        .warning{

            color:red;

            font-size:20px;

            margin-bottom:20px;
        }

        .btn{

            text-decoration:none;

            padding:12px 20px;

            border:none;

            border-radius:5px;

            font-weight:bold;

            cursor:pointer;
        }

        .delete-btn{

            background:red;

            color:white;
        }

        .cancel-btn{

            background:#002147;

            color:white;

            margin-left:10px;
        }

    </style>

</head>

<body>

    <div class="header">

        <h1>Delete Enrollment</h1>

    </div>

    <div class="container">

        <p class="warning">

            Are you sure you want to delete this enrollment?

        </p>

        <p>

            <strong>Student:</strong>

            {{ enrollment.student }}

        </p>

        <p>

            <strong>Course:</strong>

            {{ enrollment.course }}

        </p>

        <p>

            <strong>Enrollment Date:</strong>

            {{ enrollment.enrollment_date }}

        </p>

        <form method="post">

            {% csrf_token %}

            <button
                type="submit"
                class="btn delete-btn">

                Yes, Delete

            </button>

            <a
                href="/enrollments/"
                class="btn cancel-btn">

                Cancel

            </a>

        </form>

    </div>

</body>

</html>
